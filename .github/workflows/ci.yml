name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project Eli.xcodeproj \
            -scheme Eli \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Sanity check — app built
        run: test -d "$(find ~/Library/Developer/Xcode/DerivedData -name 'Eli.app' -type d | head -1)"
