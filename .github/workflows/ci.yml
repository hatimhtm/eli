name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macOS 15 ships Xcode 16, which can read XcodeGen's project format (objectVersion 77).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project Eli.xcodeproj \
            -scheme Eli \
            -configuration Debug \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath .spm \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Sanity check — app built
        run: test -d "$(find ~/Library/Developer/Xcode/DerivedData -name 'Eli.app' -type d | head -1)"
